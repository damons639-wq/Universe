<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 10-Second Redirect (Change YOUR-TARGET-URL.com) -->
    <meta http-equiv="refresh" content="10; URL='https://YOUR-TARGET-URL.com'" />
    
    <title>Universe - loading</title>
    <style>
        /* Universe Styling */
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #090a0f; font-family: sans-serif; }
        .universe { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); }
        #stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .content { 
            position: relative; z-index: 10; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh; color: white; 
            text-align: center;
        }
        h1 { font-size: 3rem; letter-spacing: 5px; text-transform: uppercase; text-shadow: 0 0 20px #5fed83; margin-bottom: 10px; }
        p { font-size: 1.2rem; color: #ccc; }
        .back-btn { color: #888; text-decoration: none; margin-top: 20px; border-bottom: 1px solid #888; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="universe">
        <canvas id="stars"></canvas>
        <div class="content">
            <h1>Game Room</h1>
            <p>Loading games...</p>
            <p style="font-size: 0.8rem; opacity: 0.6;">Redirecting you shortly</p>
            <a href="index.html" class="back-btn">Go Back</a>
        </div>
    </div>

    <script>
        /* STAR ANIMATION SCRIPT */
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let stars = [];
        
        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
        }
        
        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speed = Math.random() * 0.4 + 0.1;
            }
            draw() { 
                ctx.fillStyle = "rgba(255, 255, 255, 0.8)"; 
                ctx.beginPath(); 
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); 
                ctx.fill(); 
            }
            update() { 
                this.y += this.speed; 
                if (this.y > canvas.height) { 
                    this.y = 0; 
                    this.x = Math.random() * canvas.width; 
                } 
            }
        }
        
        function init() { 
            resize(); 
            stars = []; 
            for (let i = 0; i < 250; i++) { stars.push(new Star()); } 
        }
        
        function animate() { 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            stars.forEach(s => { s.update(); s.draw(); }); 
            requestAnimationFrame(animate); 
        }
        
        window.addEventListener('resize', init);
        init(); 
        animate();
    </script>
</body>
</html>
